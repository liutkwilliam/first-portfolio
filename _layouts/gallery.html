---
layout: page
---
<section>
	<div class="row">
		<div class="col">
			<h1 class="text-primary">{{ page.title }}</h1>
			<h5>{{ page.date | date: "%Y" }}</h5>
			<p class="text-uppercase">Photography</p>
			<p class="text-uppercase">{% assign cat = page.categories | uniq %}{{ cat | sort | join: ", " }}</p>
		</div>
	</div>
</section>
<section>
	<div class="row">
		<div class="col">
			<p>{{ page.content }}</p>
		</div>
	</div>
</section>
