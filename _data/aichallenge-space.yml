- day: 1
  theme: Spaceship Icon
  content: Design a spaceship icon using shapes and the Pen Tool.
  approach: I found a spaceship online which looks very cool and I decide to make it as an icon.
  ref: spaceship
  text: https://www.gannett-cdn.com/presto/2018/09/18/PBRE/de0dcc9c-2d01-46e4-92b4-584807e1ffa0-Screen_Shot_2018-09-18_at_00.40.05.png?crop=3792,2133,x0,y139&width=3200&height=1680&fit=bounds (Accessed on 16 May 2020)
- day: 2
  theme: Solar system Map
  content: Design a solar system travel brochure, complete with planets and info.
  approach: I want to show the solar system as a map and clearly layout with their planets' path.
- day: 3
  theme: Control Panel
  content: Design the control panel for a spaceship using outer & inner flow to create glowing buttons.
  approach: I enjoy making futuristic graphics and turns out making a futuristic vision in the year of 2052.
- day: 4
  theme: Logo
  content: Design a space-themed logo or badge using Pathfinder and Type on a Path.
  approach: I've been using similar colours across the previous challenges and I continue to use those colour palettes and create different logo variations.
  image2: aichallenge-space-004a
  image3: aichallenge-space-004b
- day: 5
  theme: Star Chart
  content: Design a galactic constellation map using Scatter Brushes and custom lines.
  approach: When we are all have been staying at home during the pandemic, we could not travel anywhere, so I imagined to see a house in the star chart in the sky.
- day: 6
  theme: Galaxy Illustration
  content: Create a galaxy inspired illustration using Freeform Gradients.
  approach: With the world is changing at the moment, I imagine what the galaxy may look like in the universe of 2052 and exploration becomes the main element of the design.
- day: 7
  theme: Moon Chart
  content: Design an illustrated moon phases chart using custom textures.
  approach: Just keep using my neon blue colour tone to represent the moon phases.
- day: 8
  theme: Black Hole
  content: Use Warp tools to distort text and shapes -- as they get sucked into a black hole!
  approach: To align with the colour and glowing effects used across this series, I immediately think of making the black hole as an electricfied hole.
- day: 9
  theme: Travel Log
  content: Design an interstellar travel log with routes and entries using the Ellipse tool & Dashed Strokes.
  approach: Combining my Day 2 (Solar System Map) and Day 7 (Galaxy Illustration), my final travel log invite passangers to travel to the new galaxy beyond the solar system that we know.