<div class="animated fadeIn shadow box-wrap">
    <a href="{% if _gallery.link %}{{ _gallery.link }}{% else %}{{ _gallery.url }}{% endif %}" class="box-link">
        <div class="box">
            <img src="/images/album/{{_gallery.foldername}}/{{_gallery.image}}" alt="{{ _gallery.slug }}">
            <div class="overlay">
                <h6>{{ _gallery.title }}</h6>
                <!-- <p class="text-uppercase">{{ _gallery.categories | uniq | join: ", " }}</p> -->
            </div>					
        </div>
    </a>
</div>
