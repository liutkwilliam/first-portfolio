<!doctype html>
<html>
    {% include head.html %}
    <body>
      {% include header.html %}
      {% assign home = "/" | pretend: site.baseurl %}
      {% if page.url == home %}
        {{ content }}
      {% else %}
        <main class="animated fadeIn">
          {{ content }}
          <button onclick="topFunction()" id="topBtn" class="shadow" title="Go to top"><i class="fa fa-angle-up" aria-hidden="true"></i></button>
        </main>
      {% endif %}
      {% include footer.html %}
    </body>
</html>
