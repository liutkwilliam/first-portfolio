---
layout: page
---
<section>
  <div class="row">
    <div class="col-md-7 d-flex align-self-center">
      <div>
        <p class="lead text-uppercase">{{ page.categories }}</p>
        <h1 class="text-primary">{{page.title}}</h1>
        <p>By {{ page.author | uniq | join: ", " }}</p>
        <p>{{ page.date | date: "%A, %d %B %Y %H:%M" }}</p>
        <p>{{ page.location }}</p>
      </div>
    </div>
    <div class="col-md">
      <img src="/images/blog/{{page.image}}" class="blog-image" alt="Image of {{ page.title }}">
    </div>
  </div>
</section>
<section>
  <div class="row">
    <div class="col">
      {{ content }}
      <hr>
      <h5>Recent Posts</h5>
      {% for post in site.posts limit:5 %}
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      {% endfor %}     
    </div>
  </div>
</section>
