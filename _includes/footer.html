<!--footer section-->
<div class="container-fluid">
	<footer class="d-flex flex-wrap justify-content-between align-items-center py-2 border-top">
		<div class="col-md d-flex align-items-center text-center text-md-end">
			<a href="{{ '/' }}" class="me-2 mb-0 text-body-secondary text-decoration-none">
				<img alt="Page Logo" src="{{ site.logo-reg }}" style="height:20px;">
			</a>
			<span class="mb-0 text-body-secondary">@ {{ 'now' | date: "%Y" }}, Tsz Kin LIU (William)</span>
		</div>
		<div class="col-md text-center text-md-end">
			{% if site.email %}<a href="mailto:{{ site.email }}" class="fa fa-lg fa-envelope-o"></a>{% endif %}
			{% if site.facebook %}<a href="https://www.facebook.com/{{ site.facebook }}/" class="fa fa-lg fa-facebook"></a>{% endif %}
			{% if site.instagram %}<a href="https://www.instagram.com/{{ site.instagram }}/" class="fa fa-lg fa-instagram"></a>{% endif %}
			{% if site.linkedin %}<a href="https://www.linkedin.com/in/{{ site.linkedin }}/" class="fa fa-lg fa-linkedin"></a>{% endif %}
		</div>	
	</footer>
</div>
