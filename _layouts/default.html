<!doctype html>
<html>
    {% include head.html %}
    <body>
      {% include header.html %}
      {% assign home = "/" | pretend: site.baseurl %}
      {% if page.url == home %}
        {{ content }}
      {% else %}
        <main class="animated fadeIn">
          {{ content }}
        </main>
      {% endif %}
      {% include footer.html %}
    </body>
</html>
